# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys the Playlist API as a free Docker web service.
services:
  - type: web
    name: playlist-api
    branch: deploy
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/songs
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
